# Database - local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/assignmentmanager
spring.datasource.username=adi
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# Auth - local dev values
app.auth.google.client-ids=${GOOGLE_CLIENT_IDS}
app.auth.google.web-client-id=${GOOGLE_WEB_CLIENT_ID}
