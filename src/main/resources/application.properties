spring.application.name=api

#Database Setup
# By Claude - PostgreSQL connection via Railway injected environment variables
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

server.address=0.0.0.0
server.port=8080

logging.level.org.flywaydb=INFO

#Authentication Properties
#app.auth.google.client-id=Y311412030231-p6d5svbpvjcna7bt17kfqo1agf6pjmv0.apps.googleusercontent.com
#app.auth.jwt.secret=tPcepxmjcTOLl8ds1z3S/USFVsx5EWLL4NCkEr8zW10giGB784hKp4GWNPptyqp1qI5uIFyBJVER8fky3gQF+g==

app.auth.google.client-ids=${GOOGLE_CLIENT_IDS}
app.auth.google.web-client-id=${GOOGLE_WEB_CLIENT_ID}
app.auth.google.android-client-id=${GOOGLE_ANDROID_CLIENT_ID}
app.auth.jwt.secret=${JWT_SECRET}
app.auth.google.client-secret=${GOOGLE_CLIENT_SECRET}
app.auth.jwt.ttl-seconds=43200
app.auth.google.redirect-uri=${GOOGLE_REDIRECT_URI}

# By Claude - Firebase service account JSON from environment variable
app.firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
app.firebase.service-account-path=
app.firebase.project-id=${FIREBASE_PROJECT_ID}

# show useful stuff
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG

logging.level.com.applicationplanner.api.notification=DEBUG

logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=DEBUG