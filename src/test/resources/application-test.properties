spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# By Claude - Disable Flyway in tests, H2 schema managed by Hibernate ddl-auto
spring.flyway.enabled=false

app.auth.google.client-ids=dummy-client-id
app.auth.google.client-secret=dummy-secret
app.auth.google.android-client-id=dummy-android-client-id
app.auth.google.web-client-id=dummy-web-client-id
app.auth.google.redirect-uri=http://localhost:8080/auth/google/callback
app.auth.jwt.secret=THIS_IS_A_LONG_TEST_SECRET_123456789012345678901234567890
app.auth.jwt.ttl-seconds=3600

# By Claude - Disable Firebase credential loading in tests
app.firebase.service-account-path=
app.firebase.service-account-json=
app.firebase.project-id=test-project